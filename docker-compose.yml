services:
  # The Express Backend
  server:
    build: 
      context: ./server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env

  # The Next.js Frontend
  client:
    build:
      context: .  
    ports:
      - "3000:3000"

    env_file:
      - ./.env.local
    depends_on:
      - server

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"